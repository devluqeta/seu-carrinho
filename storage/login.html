<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Carrinho - Login & Registro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body>

    <div class="container">
        <div class="logo-container">
            <img src="/assets/images/logoo_icon.png" alt="Logo Seu Carrinho">
            <h2>Seu<span>Carrinho</span></h2>
        </div>

        <div id="login-box" class="form-box active">
            <p class="subtitle">Bem-vindo(a) de volta! Entre na sua conta.</p>
            <form>
                <div class="input-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="Digite seu email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="password-input" placeholder="••••••••" required>
                        <span class="toggle-password">
                            <i data-lucide="eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p class="switch-form">
                Não tem uma conta? <a href="#" onclick="toggleForm('register-box')">Cadastre-se</a>
            </p>
        </div>

        <div id="register-box" class="form-box">
            <p class="subtitle">Crie sua conta para começar a usar as listas inteligentes!</p>
            <form>
                <div class="name-grid">
                    <div class="input-group">
                        <label>Nome</label>
                        <div class="input-wrapper"><input type="text" placeholder="Seu nome" required></div>
                    </div>
                    <div class="input-group">
                        <label>Sobrenome</label>
                        <div class="input-wrapper"><input type="text" placeholder="Seu sobrenome" required></div>
                    </div>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <div class="input-wrapper"><input type="email" placeholder="Digite seu email" required></div>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" class="password-input" placeholder="Crie sua senha" required>
                        <span class="toggle-password">
                            <i data-lucide="eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>
            <p class="switch-form">
                Já possui conta? <a href="#" onclick="toggleForm('login-box')">Fazer Login</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleForm(formId) {
            document.querySelectorAll('.form-box').forEach(box => box.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
        }

        document.querySelectorAll('.toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function () {
                const input = this.parentElement.querySelector('.password-input');
                const icon = this.querySelector('i');
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        });

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => { e.preventDefault(); alert('Enviado!'); });
        });
    </script>
</body>

</html>
